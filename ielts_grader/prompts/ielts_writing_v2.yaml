  # 锚定范文示例（v2.0）
  # 以下是已评分的参考作文，用于校准你的评分标准
  # ═══════════════════════════════════════════════════════════

  ## 参考示例 1: Band 5.0 (典型高原期)

  **题目：** In many countries, people are living in a "throwaway society" where they use things once and then throw them away. What are the causes of this problem and what solutions can you suggest?

  **范文：**
  Nowadays, many people live in a throwaway society. They buy things, use them for a short time, and then throw them away. This is a big problem for our environment. In this essay, I will discuss the causes of this problem and suggest some solutions.

  There are several reasons why people throw away things so easily. First, many products are cheap today. For example, you can buy a phone for a low price, so when it becomes old, people just buy a new one instead of repairing it. Second, companies make products that do not last long. They want people to buy more things, so they design products that break easily. This is called planned obsolescence. Third, people are influenced by advertising. Ads tell people they need the latest products to be happy and successful.

  To solve this problem, there are some things we can do. First, government should make laws to stop companies from making products that break too quickly. Second, we should educate people about the importance of reducing waste. Schools can teach children about recycling and reusing things. Third, people can choose to buy better quality products that last longer, even if they cost more money.

  In conclusion, the throwaway society is caused by cheap products, planned obsolescence, and advertising. The solutions include government regulation, education, and changing people's shopping habits.

  **应得评分：TA=5.0, CC=5.0, LR=5.0, GRA=5.0, Overall=5.0**
  **评分依据：** 回应了题目的 causes 和 solutions，每部分给出三个点且有基本展开。有 First/Second/Third 的衔接结构但机械。使用了 planned obsolescence 等词汇但范围有限。有复合句尝试但句式变化少。


  ## 参考示例 2: Band 6.0 (合格)

  **题目：** Some people believe that unpaid community service should be a compulsory part of high school programs. To what extent do you agree or disagree?

  **范文：**
  The question of whether high school students should be required to participate in unpaid community service has become a topic of debate. While some people argue that this would be an unnecessary burden on students, I firmly believe that making community service compulsory would bring significant benefits to both students and society.

  Firstly, compulsory community service can help students develop essential life skills that cannot be learned in a classroom. For instance, when students volunteer at a local hospital or nursing home, they learn how to communicate with people from different backgrounds and age groups. They also develop empathy and patience, which are valuable qualities in both personal and professional life. These experiences can shape their character and prepare them for future challenges.

  Secondly, community service can broaden students' horizons and help them discover their interests. Many young people have no idea what career they want to pursue. By trying different types of volunteer work, they may find a passion for teaching, healthcare, or social work. This practical exposure is often more effective than career guidance classes in helping students make informed decisions about their future.

  However, critics argue that forcing students to do community service defeats the purpose of volunteering, which should come from genuine willingness. They also point out that students already have heavy academic workloads. While these concerns are valid, I believe they can be addressed by offering a range of flexible options and allowing students to choose activities that match their interests.

  In conclusion, I strongly support making community service a compulsory part of high school education. The benefits in terms of skill development, career exploration, and social responsibility far outweigh the potential drawbacks.

  **应得评分：TA=6.0, CC=6.0, LR=6.0, GRA=6.0, Overall=6.0**
  **评分依据：** 完整回应了所有题目要求，每个论点有解释和具体化，考虑了反方观点。词汇恰当有一定范围（compulsory, empathy, exposure, genuine, drawbacks），使用了多种句子结构，语法基本准确。


  ## 参考示例 3: Band 7.0 (良好)

  **题目：** Some people think that the government should spend more money on railways rather than roads. To what extent do you agree or disagree?

  **范文：**
  The allocation of public funds between railway and road infrastructure has become a contentious issue in many countries. While roads have traditionally dominated transport budgets, I strongly believe that governments should prioritize investment in railways, as this shift would yield substantial environmental, economic, and social benefits.

  From an environmental perspective, railways are demonstrably more sustainable than road transport. Trains produce significantly lower carbon emissions per passenger-kilometer compared to cars and lorries, and they consume less energy. With climate change posing an existential threat, promoting rail travel over private car usage is an effective strategy for reducing a nation's carbon footprint. For instance, countries like Japan and France, which have invested heavily in high-speed rail networks, have successfully curtailed domestic flight demand and reduced overall transport emissions.

  Economically, railways offer considerable advantages in terms of efficiency and capacity. A single train can transport hundreds of passengers simultaneously, alleviating congestion on busy routes and reducing the economic costs associated with traffic delays. Furthermore, rail infrastructure tends to have a longer lifespan than roads, which require frequent and costly maintenance. Over the long term, strategic investment in railways may prove more cost-effective than continually expanding road networks.

  Nevertheless, it would be imprudent to completely neglect roads. Rural communities often depend on road transport due to the absence of rail connections, and the freight industry relies heavily on lorries for the final delivery of goods. Therefore, a balanced approach is necessary, with the bulk of new investment directed towards railways while maintaining existing road infrastructure.

  In conclusion, while roads remain indispensable for certain purposes, the compelling environmental and economic arguments for rail investment lead me to concur that governments should allocate greater funding to railways.

  **应得评分：TA=7.0, CC=7.0, LR=7.0, GRA=7.0, Overall=7.0**
  **评分依据：** 充分回应了题目所有部分，立场明确，论证深入且有具体例证（日本/法国高铁），考虑了反方观点。词汇丰富准确（allocation, contentious, demonstrably, existential threat, curtailed, alleviating, imprudent, indispensable, compelling），句式多样且复杂。

  ## 如何使用锚定示例
  - 当你给一篇作文评分时，先想想它和上述哪个示例最接近
  - 如果作文水平和 Band 5 示例相当 → 各维度应在 4.5-5.5 之间
  - 如果作文水平和 Band 6 示例相当 → 各维度应在 5.5-6.5 之间
  - 如果介于两者之间 → 使用 0.5 分增量，如 Band 5.5


