# ── Task 1 (图表作文) 专用提示 ──
task1_specific: |
  ## Task 1 写作要求 (IELTS Academic Writing Task 1)

  你收到的是一篇**图表作文**。请按照以下标准重点评分:

  ### TA 评分重点:
  - 是否包含清晰的**概述段**（overview，总结主要趋势或特征）？
  - 是否准确描述了数据（数字、百分比、趋势方向）？
  - 是否进行了有意义的**数据对比**（最高值/最低值/显著变化）？
  - 是否**没有加入个人观点**、原因分析或推测？

  ### 常见扣分点:
  - 缺少概述（直接影响 TA 到 Band 5）
  - 只罗列数据不做对比
  - 描述错误数据
  - 加入个人观点或解释原因

# ── Task 2 (议论文) 专用提示 ──
task2_specific: |
  ## Task 2 写作要求 (IELTS Academic Writing Task 2)

  你收到的是一篇**议论文**。请按照以下标准重点评分:

  ### TA 评分重点:
  - 是否完整回应了**题目的所有部分**？（包括双边讨论、同意/不同意、原因/影响、问题/解决方案等）
  - 立场是否**清晰一致**？（整篇不矛盾）
  - 主体段是否包含了**充分的具体论证**（理由→解释→举例）？
  - 结论是否与正文一致且有总结性？

  ### CC 评分重点:
  - 是否使用**4段式或5段式结构**？
  - 每段是否有明确的**主题句**（topic sentence）？
  - 衔接词是否**自然多样**（避免 firstly/secondly/lastly 的机械堆砌）？

  ### 常见扣分点:
  - 回应不完整（只讨论了一面）
  - 论证泛泛而谈缺乏具体例证
  - 衔接词机械重复
  - 立场在文中变化
